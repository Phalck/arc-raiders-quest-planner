<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arc Raiders Quest Planner</title>
<meta name="description" content="Interactive quest tree planner for Arc Raiders">
<meta name="theme-color" content="#1a1b26">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚔</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<aside class="left-panel">
  <div class="header-top">
    <h1>Arc Raiders — Quest Planner</h1>
    <div id="userInfo" class="user-info"></div>
  </div>
  <nav id="mainNav" class="nav-bar">
    <div class="filter-grid">
      <label for="coinSelect">Coins:</label>
      <select id="coinSelect"><option value="">—</option></select>
      <label for="blueprintSelect">Blueprints:</label>
      <select id="blueprintSelect"><option value="">—</option></select>
      <label for="locationFilter">Map:</label>
      <select id="locationFilter">
        <option value="all">All</option>
        <option value="Riven Tides">Riven Tides</option>
        <option value="Stella Montis">Stella Montis</option>
        <option value="Spaceport">Spaceport</option>
        <option value="Buried City">Buried City</option>
        <option value="Dam Battlegrounds">Dam Battlegrounds</option>
        <option value="The Blue Gate">The Blue Gate</option>
      </select>
      <label for="traderFilter">Trader:</label>
      <select id="traderFilter">
        <option value="all">All</option>
        <option value="shani">Shani</option>
        <option value="celeste">Celeste</option>
        <option value="tian_wen">Tian Wen</option>
        <option value="lance">Lance</option>
        <option value="apollo">Apollo</option>
      </select>
    </div>
      <div class="search-group">
        <input type="text" id="searchInput" placeholder="Search quests..." autocomplete="off">
      </div>
      <div class="nav-right">
        <button class="nav-btn" id="resetTrackerBtn">Reset tracker</button>
        <button id="printBtn" class="nav-btn print-btn" title="Printable checklist">🖨 Print</button>
        <button id="settingsBtn" class="nav-btn" title="Settings">⚙</button>
        <div id="authArea" class="auth-area"></div>
      </div>
    </div>
  </nav>
  <div class="tracker-panel">
    <div class="psb-header">
      <h3>Path: <span id="psbQuestName"></span></h3>
    </div>
    <div id="psbContent" class="psb-content"></div>
  </div>
</aside>

<div id="authModal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <button id="authModalClose" class="modal-close">✕</button>
    <h2 id="authTitle">Sign In</h2>
    <form id="authForm">
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" class="modal-input" placeholder="you@example.com" autocomplete="email" required>
      <label for="authPassword">Password</label>
      <input type="password" id="authPassword" class="modal-input" placeholder="At least 6 characters" autocomplete="current-password" required>
      <div id="authError" class="auth-error hidden"></div>
      <button type="submit" id="authSubmit" class="modal-btn">Sign In</button>
      <p id="authToggle" class="auth-toggle">No account? <a href="#">Create one</a></p>
    </form>
  </div>
</div>

<main>
  <div id="loading" class="loading">Loading quest data...</div>

  <div id="networkArea" class="network-area">
    <div id="mynetwork" class="network-container"></div>
  </div>
  <div id="questDetail" class="quest-detail hidden"></div>
</main>

<div id="printView" class="print-view">
  <div class="print-header">
    <h1>Arc Raiders — Quest Checklist</h1>
    <p>Generated: <span id="printDate"></span></p>
  </div>
  <div id="printContent"></div>
</div>

<div id="settingsModal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content settings-content">
    <button id="settingsModalClose" class="modal-close">✕</button>
    <h2>Settings</h2>
    <div class="settings-section">
      <h3>Progress</h3>
      <p class="settings-desc">Reset all quest progress locally and in the cloud.</p>
      <button id="resetProgressBtn" class="modal-btn danger-btn">Reset All Progress</button>
    </div>
    <div class="settings-section hidden" id="deleteAccountSection">
      <h3>Account</h3>
      <button id="signOutBtn" class="modal-btn">Sign Out</button>
      <p class="settings-desc" style="margin-top:12px">Permanently delete your account and all saved data.</p>
      <button id="deleteAccountBtn" class="modal-btn danger-btn">Delete Account &amp; Data</button>
    </div>
    <div id="settingsError" class="settings-error hidden"></div>
  </div>
</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
